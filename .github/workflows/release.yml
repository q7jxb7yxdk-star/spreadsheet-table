name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Release $GITHUB_REF_NAME

          Changes:
          - Built release assets with GitHub Actions.
          - Generated artifact attestations for release assets.
          - Uploaded Obsidian plugin assets for installation.

          Release assets:
          - main.js
          - manifest.json
          - styles.css
          EOF

          gh release create "$GITHUB_REF_NAME" \
            main.js manifest.json styles.css \
            --title "Spreadsheet Table $GITHUB_REF_NAME" \
            --notes-file release-notes.md
